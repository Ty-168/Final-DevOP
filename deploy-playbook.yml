---
- name: Deploy, Build, Test, and Backup Application
  hosts: webservers
  become: yes
  vars:
    # IMPORTANT: Update this to match the exact path of your project on the Web Server
    project_dir: "/root/Final-DevOP/demo" 
    db_name: "A-LIM-Kity-db"
    db_user: "root"
    db_pass: "Hello@123"

  tasks:
    - name: Ensure Git, Maven, and Java 21 JDK are installed on the server
      apt:
        name: 
          - git
          - maven
          - openjdk-21-jdk-headless
          - mysql-client
        state: present
        update_cache: yes

    - name: Pull latest code from Git main branch (Forces overwrite of local changes)
      git:
        repo: "git@github.com:Ty-168/Final-DevOP.git"
        dest: "{{ project_dir }}"
        version: main
        force: yes
        update: yes
        accept_hostkey: yes

    - name: Run Maven tests (Forces SQLite test profile)
      command: mvn test -Dspring.profiles.active=test
      args:
        chdir: "{{ project_dir }}"

    - name: Build project using Maven (skip tests during packaging)
      command: mvn clean package -DskipTests
      args:
        chdir: "{{ project_dir }}"

    - name: Generate timestamp for backup
      setup:
        filter: ansible_date_time

    - name: Backup the MySQL database
      shell: "mysqldump -h 127.0.0.1 -u {{ db_user }} -p{{ db_pass }} {{ db_name }} > /root/backup_{{ ansible_date_time.iso8601_basic_short }}.sql"

    - name: Download backup SQL to your local folder for submission
      fetch:
        src: "/root/backup_{{ ansible_date_time.iso8601_basic_short }}.sql"
        dest: "{{ playbook_dir }}/"
        flat: yes
